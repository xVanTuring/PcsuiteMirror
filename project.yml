name: PcsuiteMirror
options:
  bundleIdPrefix: tech.xvanturing
  developmentLanguage: en
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 mode — relaxes strict-concurrency on the FFI classes
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  PcsuiteMirror:
    type: application
    platform: macOS
    sources:
      - path: Sources
      # swift-bridge generated glue (compiled into the app)
      - path: ../pcsuite-rs/crates/pcsuite-ffi/generated/SwiftBridgeCore.swift
      - path: ../pcsuite-rs/crates/pcsuite-ffi/generated/pcsuite-ffi/pcsuite-ffi.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        # Menu-bar agent: no Dock icon, no app-switcher entry (even before AppDelegate runs).
        INFOPLIST_KEY_LSUIElement: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: tech.xvanturing.vi-conn
        # Bumped by scripts/release.sh; "0.0.0"/build 0 is the unreleased baseline.
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "2"
        # App icon lives in Sources/Resources/Assets.xcassets (built by scripts/make-icon.sh).
        # GENERATE_INFOPLIST_FILE picks up CFBundleIconName from this automatically.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridging-Header.h
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../pcsuite-rs/target/release
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../pcsuite-rs/crates/pcsuite-ffi/generated
          - $(PROJECT_DIR)/../pcsuite-rs/crates/pcsuite-ffi/generated/pcsuite-ffi
        OTHER_LDFLAGS:
          - -lpcsuite_ffi
          - -liconv
